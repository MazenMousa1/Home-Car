<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Home&Car</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap"

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="blur blur-1"></div>
  <div class="blur blur-2"></div>

  
  <main class="container">

    <div class="logo-box">
      <img src="" alt="Home&Car Logo">
    </div>

    <h1>Home&Car</h1>

    <p class="desc">

    </p>

    <a href="#" class="main-btn">

    </a>

    <section class="socials">

  



      <a href="#" class="social-card">
        <i class="fa-brands fa-youtube"></i>
      </a>

      <a href="#" class="social-card">
        <i class="fa-brands fa-tiktok"></i>
      </a>

      <a href="#" class="social-card">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="#" class="social-card">
        <i class="fa-brands fa-facebook-f"></i>
      </a>

      <a href="#" class="social-card">
        <i class="fa-brands fa-x-twitter"></i>
      </a>

    </section>

    <section class="app-card">

      <img src="" alt="App Logo">

      <div class="app-info">
        <h2>Home&Car App</h2>
        <p>
          تطبيق شامل لخدمات المنازل والسيارات والنقل.
        </p>

      <a href="#" class="download-btn">
